name: SPEC.md → Google Docs 自動同期

on:
  push:
    paths:
      - 'hospital-search/SPEC.md'
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: googleapis インストール
        run: npm install googleapis

      - name: SPEC.md を Google Docs に同期
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_DOC_ID: ${{ secrets.GOOGLE_DOC_ID }}
        run: node hospital-search/scripts/sync-spec-to-gdocs.js
